# 로컬 개발용 — DB 컨테이너만 실행
# 사용: docker compose -f docker-compose.db-only.yml up -d
services:
  db:
    image: postgres:16-alpine
    container_name: blackbox_db
    restart: unless-stopped
    ports:
      - "5432:5432"          # 호스트에서 localhost:5432 접근 가능
    environment:
      POSTGRES_DB:       blackbox_db
      POSTGRES_USER:     blackbox
      POSTGRES_PASSWORD: blackbox1234
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackbox -d blackbox_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata_local:
    driver: local
