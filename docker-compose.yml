services:

  # ─────────────────────────────────────────
  # 1. DATABASE
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: blackbox_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blackbox_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. BACKEND (Spring Boot — 로컬 빌드)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackbox_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-1800000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      FILE_UPLOAD_DIR: /data/uploads
      SPRING_PROFILES_ACTIVE: local
      # CORS — 브라우저 origin 허용 목록 (local 프로파일에서 "*" 로 덮어씀)
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-*}
      # 확장 기능 API 키
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      NOTION_PARENT_PAGE_ID: ${NOTION_PARENT_PAGE_ID:-}
      NOTION_CALENDAR_DB_ID: ${NOTION_CALENDAR_DB_ID:-}
    volumes:
      - uploads:/data/uploads
    networks:
      - blackbox_net
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # 3. FRONTEND (Next.js — 로컬 빌드)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blackbox_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost/api}
    networks:
      - blackbox_net
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # 4. NGINX (리버스 프록시 + SSL)
  # ─────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: blackbox_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/data/uploads:ro
    networks:
      - blackbox_net
    depends_on:
      - frontend
      - backend

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  blackbox_net:
    driver: bridge
