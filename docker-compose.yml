services:

  # ─────────────────────────────────────────
  # 1. DATABASE
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: blackbox_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blackbox_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. BACKEND (Spring Boot)
  # ─────────────────────────────────────────
  backend:
    image: qbuzxj370/blackbox-backend:latest
    container_name: blackbox_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-1800000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      UPLOAD_PATH: /data/uploads
    volumes:
      - uploads:/data/uploads
    networks:
      - blackbox_net
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # 3. FRONTEND (Next.js)
  # ─────────────────────────────────────────
  frontend:
    image: qbuzxj370/blackbox-frontend:latest
    container_name: blackbox_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    networks:
      - blackbox_net
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # 4. NGINX (리버스 프록시)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: blackbox_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/data/uploads:ro
    networks:
      - blackbox_net
    depends_on:
      - frontend
      - backend

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  blackbox_net:
    driver: bridge