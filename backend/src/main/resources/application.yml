spring:
  datasource:
    # docker-compose.yml에서 SPRING_DATASOURCE_* 환경변수로 직접 주입됨
    # 로컬 개발(application-local.yml)에서는 localhost:5432 사용
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blackbox_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

app:
  cors:
    origins: ${APP_CORS_ORIGINS:*}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:1800000}                    # access token 30분
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # refresh token 7일
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/data/uploads}
  frontend-base-url: ${FRONTEND_BASE_URL:}       # 10분 전 알림 URL 생성용 (예: https://yourdomain.com)

external:
  github:
    app-id: ${GITHUB_APP_ID:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    base-url: https://api.github.com
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost/api/auth/google/callback}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
    base-url: https://api.anthropic.com
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    base-url: https://api.openai.com
  notion:
    api-key: ${NOTION_API_KEY:}
    parent-page-id: ${NOTION_PARENT_PAGE_ID:}
    calendar-db-id: ${NOTION_CALENDAR_DB_ID:}   # Notion 캘린더 데이터베이스 ID (선택)
    base-url: https://api.notion.com
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:}         # 글로벌 폴백용 (현재 미사용, per-project DB에서 관리)
